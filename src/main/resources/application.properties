spring.application.name=hello-agent

# Load secrets from gitignored application-local.properties (overrides env vars)
spring.config.import=optional:classpath:application-local.properties

# Chapter 4 - LLM (OpenAI-compatible) — set llm.api-key in application-local.properties or env LLM_API_KEY
llm.model-id=qwen3-max
llm.api-key=${LLM_API_KEY:}
llm.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
llm.timeout=60

# Chapter 4 - SerpApi search tool — set serpapi.api-key in application-local.properties or env SERPAPI_API_KEY
serpapi.api-key=${SERPAPI_API_KEY:}
